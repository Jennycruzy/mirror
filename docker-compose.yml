services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mirror
      POSTGRES_PASSWORD: mirror
      POSTGRES_DB: mirror
    ports:
      - "5432:5432"
    volumes:
      - mirror-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirror -d mirror"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mirror-postgres:

